{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — Talep Yönetim Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="col-sm-8 col-md-5 col-lg-4 px-3">

        <!-- Başlık -->
        <div class="text-center mb-4">
            <h4 class="fw-semibold">Talep Yönetim Sistemi</h4>
            <p class="text-muted small">Devam etmek için giriş yapın</p>
        </div>

        <!-- Bildirim mesajları -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show py-2" role="alert">
                    <small>{{ message }}</small>
                    <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- Giriş formu -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Kullanıcı Adı</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text"
                                   name="username"
                                   id="id_username"
                                   class="form-control"
                                   placeholder="Kullanıcı adınız"
                                   autofocus
                                   required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">Şifre</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password"
                                   name="password"
                                   id="id_password"
                                   class="form-control"
                                   placeholder="Şifreniz"
                                   required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Giriş Yap
                    </button>
                </form>
            </div>
        </div>

        <!-- Kayıt linki -->
        <div class="text-center mt-3">
            <small class="text-muted">
                Hesabınız yok mu?
                <a href="{% url 'identity:register' %}" class="text-decoration-none">Kayıt olun</a>
            </small>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
