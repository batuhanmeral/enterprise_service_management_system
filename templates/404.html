{% extends "base.html" %}

{% block title %}404 — Sayfa Bulunamadı{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">404</div>
    <div class="error-icon">
        <i class="bi bi-search"></i>
    </div>
    <h2 class="h4 mb-3">Sayfa Bulunamadı</h2>
    <p class="text-muted mb-4">
        Aradığınız sayfa mevcut değil veya taşınmış olabilir.<br>
        Adres çubuğunu kontrol edin ya da ana sayfaya dönün.
    </p>
    <div class="d-flex justify-content-center gap-2">
        <a href="{% url 'dashboard:home' %}" class="btn btn-dark">
            <i class="bi bi-house me-1"></i>Ana Sayfa
        </a>
        <button onclick="history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Geri Dön
        </button>
    </div>
</div>
{% endblock %}
