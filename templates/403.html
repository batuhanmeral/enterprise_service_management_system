{% extends "base.html" %}

{% block title %}403 — Erişim Engellendi{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-code">403</div>
    <div class="error-icon">
        <i class="bi bi-shield-lock"></i>
    </div>
    <h2 class="h4 mb-3">Erişim Engellendi</h2>
    <p class="text-muted mb-4">
        Bu sayfaya erişim yetkiniz bulunmamaktadır.<br>
        Yetkili olduğunuzu düşünüyorsanız sistem yöneticisiyle iletişime geçin.
    </p>
    <div class="d-flex justify-content-center gap-2">
        <a href="{% url 'dashboard:home' %}" class="btn btn-dark">
            <i class="bi bi-house me-1"></i>Ana Sayfa
        </a>
        <button onclick="history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Geri Dön
        </button>
    </div>
</div>
{% endblock %}
